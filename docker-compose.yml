services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: audiodelivery-sql
    environment:
      ACCEPT_EULA: "Y"
      SA_PASSWORD: ${SA_PASSWORD}
      MSSQL_PID: "Developer"
    ports:
      - "1433:1433"
    volumes:
      - audiodelivery-sqldata:/var/opt/mssql
    restart: unless-stopped

volumes:
  audiodelivery-sqldata:
